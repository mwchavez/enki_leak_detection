<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enki Monitor</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Canvas Gauges CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>
    <style>
        :root {
            --bg-neutral: #f8fafc;
            --text-main: #1e293b;
            --enki-blue: #3b82f6;
            --enki-blue-dark: #1d4ed8;
            --enki-blue-light: #dbeafe;
            --success-green: #22c55e;
            --warning-yellow: #eab308;
            --error-red: #ef4444;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-neutral);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            text-align: left;
            border-bottom: 2px solid var(--enki-blue-light);
            padding-bottom: 1rem;
        }

        h1 {
            margin: 0;
            color: var(--enki-blue);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .timestamp {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .node-selector-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .node-selector-container label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #475569;
        }

        select {
            padding: 0.4rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            background-color: white;
            font-size: 0.875rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--enki-blue);
            box-shadow: 0 0 0 2px var(--enki-blue-light);
        }

        .gauge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .gauge-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .gauge-card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 1.25rem;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .gauge-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .gauge-canvas-container {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .chart-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 1rem;
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }

        .consensus-block {
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .consensus-no-leak {
            background-color: var(--success-green);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
        }

        .consensus-leak {
            background-color: var(--error-red);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
        }

        .demo-mode {
            margin-top: 2rem;
            padding: 1.5rem;
            border-top: 1px solid #e2e8f0;
            width: 100%;
            text-align: center;
        }

        .demo-mode-title {
            font-weight: 700;
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .demo-mode-note {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        button {
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            border: 1px solid var(--enki-blue);
            background: transparent;
            color: var(--enki-blue);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--enki-blue-light);
        }

        button.active {
            background: var(--enki-blue);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Enki Monitor</h1>
            <div id="last-updated" class="timestamp">Last updated: Loading...</div>
            <div class="node-selector-container">
                <label for="node-selector">Sensor Location:</label>
                <select id="node-selector">
                    <option value="node-01">node-01 (Kitchen)</option>
                    <option value="node-02">node-02 (Water Heater)</option>
                    <option value="node-03">node-03 (Bathroom)</option>
                </select>
            </div>
        </header>

        <div class="gauge-grid">
            <div class="gauge-card">
                <div class="gauge-label">Moisture</div>
                <div class="gauge-canvas-container">
                    <canvas id="gauge-moisture"></canvas>
                </div>
            </div>
            <div class="gauge-card">
                <div class="gauge-label">Temperature</div>
                <div class="gauge-canvas-container">
                    <canvas id="gauge-temp"></canvas>
                </div>
            </div>
            <div class="gauge-card">
                <div class="gauge-label">Vibration</div>
                <div class="gauge-canvas-container">
                    <canvas id="gauge-vibration"></canvas>
                </div>
            </div>
            <div class="gauge-card">
                <div class="gauge-label">Acoustic</div>
                <div class="gauge-canvas-container">
                    <canvas id="gauge-acoustic"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="chart-title">Moisture – Last 24 Hours</div>
            <div class="chart-container">
                <canvas id="moistureTrendChart"></canvas>
            </div>
        </div>

        <div id="consensus-block" class="consensus-block consensus-no-leak">
            Consensus: No Leak
        </div>

        <div class="demo-mode">
            <div class="demo-mode-title">Demo Mode</div>
            <div class="demo-mode-note">For demonstration purposes — toggle to preview alert state.</div>
            <div class="controls">
                <button id="btn-normal" class="active">Normal State</button>
                <button id="btn-leak">Leak State</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA GENERATION ---
        const generateData = (isLeak) => {
            const data = [];
            const now = Math.floor(Date.now() / 1000);
            const interval = 30 * 60; // 30 minutes in seconds
            const points = 48; // 24 hours

            for (let i = points; i >= 0; i--) {
                const timestamp = now - (i * interval);
                
                // Base values with some "smooth" variation
                let moisture = 68 + Math.sin(i / 5) * 4 + (Math.random() * 2);
                let temperature = 16 + Math.cos(i / 8) * 1 + (Math.random() * 0.5);
                let vibration = 0.08 + Math.sin(i / 3) * 0.03 + (Math.random() * 0.02);
                let acoustic = 350 + Math.sin(i / 10) * 40 + (Math.random() * 10);

                // Inject leak in the last 4 hours if isLeak is true
                if (isLeak && i < 8) {
                    const factor = (8 - i) / 8;
                    moisture += 15 * factor + 5; // Will cross 80
                    temperature += 3 * factor + 1; // Will cross 18
                    vibration += 0.25 * factor + 0.05; // Will cross 0.3
                    acoustic += 200 * factor + 50; // Will cross 500
                }

                data.push({
                    device_id: "node-01",
                    timestamp: timestamp,
                    moisture: parseFloat(moisture.toFixed(1)),
                    temperature: parseFloat(temperature.toFixed(1)),
                    vibration: parseFloat(vibration.toFixed(2)),
                    acoustic: parseFloat(acoustic.toFixed(1))
                });
            }
            return data;
        };

        // --- GAUGE INITIALIZATION ---
        const createGauge = (id, title, units, min, max, highlights) => {
            return new RadialGauge({
                renderTo: id,
                width: 150,
                height: 150,
                units: units,
                minValue: min,
                maxValue: max,
                majorTicks: [min, max],
                minorTicks: 2,
                strokeTicks: true,
                highlights: highlights,
                colorPlate: "#fff",
                borderShadowWidth: 0,
                borders: false,
                needleType: "arrow",
                needleWidth: 2,
                needleCircleSize: 7,
                needleCircleOuter: true,
                needleCircleInner: false,
                animationDuration: 1500,
                animationRule: "linear",
                valueBox: true,
                valueInt: 1,
                valueDec: 1,
                fontValueSize: 35,
                fontUnitsSize: 20,
                colorValueBoxRect: "transparent",
                colorValueBoxRectEnd: "transparent",
                colorValueBoxBackground: "transparent",
                colorValueText: "#1e293b",
                colorUnits: "#64748b"
            }).draw();
        };

        let gaugeMoisture, gaugeTemp, gaugeVibration, gaugeAcoustic;

        const initGauges = () => {
            gaugeMoisture = createGauge('gauge-moisture', 'Moisture', '%', 0, 100, [
                { from: 0, to: 70, color: "rgba(34, 197, 94, .75)" },
                { from: 70, to: 80, color: "rgba(234, 179, 8, .75)" },
                { from: 80, to: 100, color: "rgba(239, 68, 68, .75)" }
            ]);
            gaugeTemp = createGauge('gauge-temp', 'Temp', '°C', 0, 30, [
                { from: 0, to: 15, color: "rgba(34, 197, 94, .75)" },
                { from: 15, to: 18, color: "rgba(234, 179, 8, .75)" },
                { from: 18, to: 30, color: "rgba(239, 68, 68, .75)" }
            ]);
            gaugeVibration = createGauge('gauge-vibration', 'Vib', 'g', 0, 1, [
                { from: 0, to: 0.2, color: "rgba(34, 197, 94, .75)" },
                { from: 0.2, to: 0.3, color: "rgba(234, 179, 8, .75)" },
                { from: 0.3, to: 1, color: "rgba(239, 68, 68, .75)" }
            ]);
            gaugeAcoustic = createGauge('gauge-acoustic', 'Freq', 'Hz', 0, 1000, [
                { from: 0, to: 400, color: "rgba(34, 197, 94, .75)" },
                { from: 400, to: 500, color: "rgba(234, 179, 8, .75)" },
                { from: 500, to: 1000, color: "rgba(239, 68, 68, .75)" }
            ]);
        };

        // --- TREND CHART ---
        let trendChart;
        const trendCtx = document.getElementById('moistureTrendChart').getContext('2d');

        const updateDashboard = (isLeak) => {
            const data = generateData(isLeak);
            const latest = data[data.length - 1];

            // Update Gauges
            gaugeMoisture.value = latest.moisture;
            gaugeTemp.value = latest.temperature;
            gaugeVibration.value = latest.vibration;
            gaugeAcoustic.value = latest.acoustic;

            // Update Trend Chart
            const labels = data.map(d => {
                const date = new Date(d.timestamp * 1000);
                return date.getHours() + ":" + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
            });

            if (trendChart) {
                trendChart.destroy();
            }

            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Moisture (%)',
                        data: data.map(d => d.moisture),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            title: { display: true, text: 'Percentage (%)' }
                        },
                        x: {
                            ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // Update Consensus Block
            const block = document.getElementById('consensus-block');
            const hasLeak = latest.moisture > 80 || latest.temperature > 18 || latest.vibration > 0.3 || latest.acoustic > 500;
            
            if (hasLeak) {
                block.textContent = "Consensus: Leak Detected";
                block.className = "consensus-block consensus-leak";
            } else {
                block.textContent = "Consensus: No Leak";
                block.className = "consensus-block consensus-no-leak";
            }

            // Update Timestamp
            const now = new Date();
            document.getElementById('last-updated').textContent = `Last updated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
        };

        // --- INITIALIZATION & EVENTS ---
        document.addEventListener('DOMContentLoaded', () => {
            initGauges();
            updateDashboard(false);

            document.getElementById('btn-normal').addEventListener('click', () => {
                updateDashboard(false);
                document.getElementById('btn-normal').classList.add('active');
                document.getElementById('btn-leak').classList.remove('active');
            });

            document.getElementById('btn-leak').addEventListener('click', () => {
                updateDashboard(true);
                document.getElementById('btn-leak').classList.add('active');
                document.getElementById('btn-normal').classList.remove('active');
            });

            // Node selector (concept only)
            document.getElementById('node-selector').addEventListener('change', () => {
                // Just refresh current state to show it works
                const isLeak = document.getElementById('btn-leak').classList.contains('active');
                updateDashboard(isLeak);
            });
        });
    </script>
</body>
</html>
